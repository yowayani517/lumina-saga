<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>contact sheet</title></head>
<body style="background:#222">
<canvas id="sheet"></canvas>
<script>
// モンスター素材のコンタクトシートを生成して /snap へPOSTする
var files = [];
var families = {
  1: 3, 2: 3, 3: 3, 4: 3, 5: 1, 6: 3, 7: 3, 8: 2, 9: 2, 10: 2,
  11: 2, 12: 2, 13: 2, 14: 2, 15: 2, 16: 3, 17: 3, 18: 3, 19: 3, 20: 3,
  21: 3, 22: 2, 23: 1, 24: 1, 25: 1, 26: 2, 27: 2, 28: 1, 29: 1, 30: 1,
  31: 1, 32: 1, 33: 1, 34: 1, 35: 1, 36: 1, 37: 1, 38: 1, 39: 1, 40: 1,
  41: 1, 42: 3, 43: 2, 44: 2, 45: 3, 46: 3, 47: 4, 48: 1, 49: 1, 50: 1, 51: 3
};
var page = parseInt(new URLSearchParams(location.search).get("page") || "0", 10);
for (var fam in families) {
  for (var s = 0; s < families[fam]; s++) files.push(fam + "_" + s);
}
var PER = 35;
files = files.slice(page * PER, page * PER + PER);

var COLS = 7;
var CELL = 140;
var rows = Math.ceil(files.length / COLS);
var c = document.getElementById("sheet");
c.width = COLS * CELL;
c.height = rows * (CELL + 22);
var x = c.getContext("2d");
x.fillStyle = "#384048";
x.fillRect(0, 0, c.width, c.height);
x.imageSmoothingEnabled = false;

var loaded = 0;
files.forEach(function (f, i) {
  var img = new Image();
  img.onload = img.onerror = function () {
    var col = i % COLS, row = Math.floor(i / COLS);
    var px = col * CELL, py = row * (CELL + 22);
    if (img.width) x.drawImage(img, px + 6, py + 2, 128, 128);
    x.fillStyle = "#ffd95e";
    x.font = "bold 16px sans-serif";
    x.fillText(f, px + 8, py + 148);
    loaded++;
    if (loaded === files.length) {
      fetch("http://localhost:8766/snap", { method: "POST", mode: "no-cors", body: c.toDataURL("image/png") })
        .then(function(){ document.title = "DONE"; });
    }
  };
  img.src = "../assets/gm/monsters/" + f + ".png";
});
</script>
</body>
</html>
